name: Build Multi-Platform Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: claude-code-proxy
            asset_name: claude-code-proxy-linux-x86_64
          - os: macos-13
            artifact_name: claude-code-proxy
            asset_name: claude-code-proxy-darwin-x86_64
          - os: macos-latest
            artifact_name: claude-code-proxy
            asset_name: claude-code-proxy-darwin-arm64
          - os: windows-latest
            artifact_name: claude-code-proxy.exe
            asset_name: claude-code-proxy-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build binary with PyInstaller
        run: uv run pyinstaller claude-code-proxy.spec

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/claude-code-proxy-linux-x86_64
            artifacts/claude-code-proxy-darwin-x86_64
            artifacts/claude-code-proxy-darwin-arm64
            artifacts/claude-code-proxy-windows-x86_64.exe
            setup.sh
            start.sh
            stop.sh
